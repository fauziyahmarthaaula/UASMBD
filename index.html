<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KosKita Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-house"></i>
            <span>KosKita</span>
        </div>

        <ul>

            <li class="active">
                <i class="fa-solid fa-chart-line"></i>
                Dashboard
            </li>

            <li>
                <i class="fa-solid fa-building"></i>
                Properti
            </li>

            <li>
                <i class="fa-solid fa-bed"></i>
                Kamar
            </li>

            <li>
                <i class="fa-solid fa-users"></i>
                Penyewa
            </li>

            <li>
                <i class="fa-solid fa-money-bill-wave"></i>
                Pembayaran
            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main>

        <header>

            <div>

                <h1>Dashboard Pemilik Kos</h1>
                <p>Monitoring Properti KosKita</p>

            </div>

            <div class="profile">

                <i class="fa-solid fa-user"></i>

                <span>Pemilik</span>

            </div>

        </header>

        <!-- Statistik -->

        <section class="cards">

            <div class="card blue">

                <i class="fa-solid fa-building"></i>

                <div>

                    <h2 id="totalProperty">0</h2>

                    <p>Total Properti</p>

                </div>

            </div>

            <div class="card green">

                <i class="fa-solid fa-bed"></i>

                <div>

                    <h2 id="totalRoom">0</h2>

                    <p>Total Kamar</p>

                </div>

            </div>

            <div class="card orange">

                <i class="fa-solid fa-user-check"></i>

                <div>

                    <h2 id="occupiedRoom">0</h2>

                    <p>Kamar Terisi</p>

                </div>

            </div>

            <div class="card red">

                <i class="fa-solid fa-file-invoice-dollar"></i>

                <div>

                    <h2 id="totalUnpaid">0</h2>

                    <p>Tagihan Tertunggak</p>

                </div>

            </div>

        </section>

        <!-- Properti -->

        <section class="panel">

            <div class="panel-header">

                <h2>Daftar Properti & Kamar</h2>

            </div>

            <div id="propertyContainer">

            </div>

        </section>

        <!-- Tagihan -->

        <section class="panel">

            <div class="panel-header">

                <h2>Tagihan Belum Dibayar</h2>

            </div>

            <table>

                <thead>

                    <tr>

                        <th>Tenant</th>
                        <th>Properti</th>
                        <th>Bulan</th>
                        <th>Jumlah</th>
                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="paymentBody">

                </tbody>

            </table>

        </section>

    </main>

    <script type="module" src="app.js"></script>

</body>

</html>
